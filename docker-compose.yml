version: '3.8'

services:
  search_engine:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml
    environment:
      - PYTHONPATH=/app
    depends_on:
      - redis
    networks:
      - search_network

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - search_network

volumes:
  redis_data:

networks:
  search_network:
    driver: bridge